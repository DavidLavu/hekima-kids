<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Butterflies">
<link rel="apple-touch-icon" href="icon.png">
<title>Butterfly maths</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <h1>Butterfly maths</h1>
  <div id="hdrBtns">
    <button class="hdr-btn" id="albumBtn">🦋 Album</button>
    <button class="hdr-btn" id="soundBtn" aria-pressed="true">Sound: on</button>
    <button class="hdr-btn" id="voiceBtn" aria-pressed="true">Voice: on</button>
  </div>
</header>
<main>
  <div id="modes"></div>
  <div id="quest" class="hidden" title="Today’s quest"></div>
  <div id="stars"></div>
  <p id="qcount"></p>
  <div id="picture" title="Tap to hear the question again"></div>
  <p id="question" title="Tap to hear the question again"></p>
  <div id="answers"></div>
  <p id="msg"></p>
</main>
<footer>
  <span id="totalCaught"></span>
  <a id="grownLink">Grown-ups</a>
</footer>
<svg id="meadow" viewBox="0 0 680 170" preserveAspectRatio="xMidYMax slice" role="img" aria-label="A meadow that fills with butterflies as you answer correctly">
  <g transform="translate(622 30)">
    <path d="M-28 0 H-36 M28 0 H36 M0 -28 V-36 M0 28 V36 M-20 -20 L-26 -26 M20 20 L26 26 M-20 20 L-26 26 M20 -20 L26 -26" stroke="#f3cf63" stroke-width="4" stroke-linecap="round"/>
    <circle r="19" fill="#f7d154"/>
  </g>
  <g fill="#f6f1e2">
    <ellipse cx="150" cy="30" rx="36" ry="13"/><ellipse cx="174" cy="21" rx="23" ry="10"/><ellipse cx="126" cy="23" rx="19" ry="9"/>
    <ellipse cx="420" cy="22" rx="28" ry="10"/><ellipse cx="440" cy="15" rx="17" ry="8"/>
  </g>
  <path d="M0 100 C 120 78 240 110 360 96 C 480 84 580 106 680 92 L680 170 L0 170 Z" fill="#7fb163"/>
  <path d="M0 128 C 150 112 300 138 460 124 C 560 115 620 128 680 120 L680 170 L0 170 Z" fill="#6a9c52"/>
  <g id="garden"></g>
  <circle cx="80" cy="132" r="4" fill="#f2e6c9"/><circle cx="162" cy="142" r="4" fill="#e6a4b8"/>
  <circle cx="300" cy="138" r="4" fill="#e8c84f"/><circle cx="452" cy="134" r="4" fill="#e6a4b8"/>
  <circle cx="560" cy="142" r="4" fill="#f2e6c9"/><circle cx="622" cy="130" r="4" fill="#e8c84f"/>
  <g id="sfield"></g>
  <g id="bfield"></g>
</svg>

<div id="albumPage" class="overlay hidden">
  <div class="ovl-head">
    <h2>🦋 Butterfly album</h2>
    <button class="hdr-btn" id="albumClose">✕ Back to the meadow</button>
  </div>
  <div class="ovl-body">
    <p id="albumTotal"></p>
    <div id="albumGrid"></div>
    <div id="treasureSects"></div>
    <h3 class="sect">🌸 Your learning garden</h3>
    <p class="note">Every flower blooms as you practise. Five right answers grow one petal!</p>
    <div id="meters"></div>
  </div>
</div>

<div id="grownPage" class="overlay hidden">
  <div class="ovl-head">
    <h2>Grown-ups</h2>
    <button class="hdr-btn" id="grownClose">✕ Back</button>
  </div>
  <div class="ovl-body">
    <div id="gate">
      <p>A quick question to keep little fingers out: <strong id="gateQ">what is 7 × 8?</strong></p>
      <input type="number" id="gateIn" inputmode="numeric" aria-label="Answer to the grown-ups question">
      <button class="gbtn" id="gateBtn">Open</button>
      <p id="gateMsg" class="note"></p>
    </div>
    <div id="grownContent" style="display:none"></div>
  </div>
</div>

<script src="js/core.js"></script>
<script src="js/audio.js"></script>
<script src="js/collectibles.js"></script>
<script src="js/quest.js"></script>
<script src="js/pictures.js"></script>
<script src="js/questions.js"></script>
<script src="js/game.js"></script>
<script src="js/scene.js"></script>
<script src="js/round.js"></script>
<script src="js/album.js"></script>
<script src="js/grownups.js"></script>
<script src="js/main.js"></script>
</body>
</html>
