<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Butterflies">
<link rel="apple-touch-icon" href="icon.png">
<title>Butterfly maths</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0;
  background: #fdf8ec;
  color: #3a3226;
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 18px 0;
  max-width: 680px;
  width: 100%;
  margin: 0 auto;
}
h1 { font-size: 22px; margin: 0; font-weight: 700; color: #5a4a2f; }
.hdr-btn {
  font-size: 13px;
  padding: 7px 12px;
  border: 2px solid #d8cdb4;
  border-radius: 999px;
  background: #fff;
  color: #5a4a2f;
  cursor: pointer;
}
#hdrBtns { display: flex; gap: 6px; flex-wrap: wrap; }
main { max-width: 560px; width: 100%; margin: 0 auto; padding: 4px 18px 0; flex: 1; min-height: 0; overflow-y: auto; }
.ygroup { display: flex; align-items: center; gap: 6px; margin: 3px 0 0; }
.ylabel { flex: 0 0 36px; font-size: 11px; font-weight: 700; color: #a08f6e; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; line-height: 1.15; }
.chips { display: flex; flex-wrap: nowrap; gap: 7px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 3px 2px; flex: 1; }
.chips::-webkit-scrollbar { display: none; }
.chips.moreR { -webkit-mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 34px), transparent); mask-image: linear-gradient(90deg, #000 0, #000 calc(100% - 34px), transparent); }
.chips.moreL { -webkit-mask-image: linear-gradient(90deg, transparent, #000 34px); mask-image: linear-gradient(90deg, transparent, #000 34px); }
.chips.moreL.moreR { -webkit-mask-image: linear-gradient(90deg, transparent, #000 34px, #000 calc(100% - 34px), transparent); mask-image: linear-gradient(90deg, transparent, #000 34px, #000 calc(100% - 34px), transparent); }
.mode-btn {
  flex: 0 0 auto;
  font-size: 14px;
  padding: 9px 13px;
  border: 2px solid #d8cdb4;
  border-radius: 999px;
  background: #fff;
  color: #5a4a2f;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.mode-btn .ic { font-size: 17px; line-height: 1; }
.mode-btn.y3 { border-color: #e3c87e; }
.mode-btn.on { background: #4a7ba6; border-color: #4a7ba6; color: #fff; }
.mode-btn .dot { width: 9px; height: 9px; border-radius: 50%; background: #e4dcc8; display: inline-block; }
#stars { display: flex; gap: 7px; justify-content: center; margin: clamp(4px, 1.2vh, 10px) 0 4px; }
.star { width: clamp(15px, 2.4vh, 22px); height: clamp(15px, 2.4vh, 22px); }
#qcount { text-align: center; font-size: 13px; color: #a08f6e; margin: 0 0 2px; min-height: 16px; }
#picture { display: flex; justify-content: center; margin: 4px 0; min-height: 0; cursor: pointer; }
#question { text-align: center; font-size: clamp(32px, 6.4vh, 52px); font-weight: 700; margin: 2px 0 clamp(6px, 1.6vh, 16px); min-height: clamp(40px, 7.5vh, 62px); cursor: pointer; }
#answers { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: clamp(9px, 1.6vh, 14px); }
.ans-btn {
  font-size: clamp(22px, 4vh, 32px);
  font-weight: 700;
  padding: clamp(11px, 2.6vh, 22px) 0;
  border: 2px solid #d8cdb4;
  border-radius: 18px;
  background: #fff;
  color: #3a3226;
  cursor: pointer;
}
.ans-btn.txt { font-size: clamp(15px, 2.6vh, 21px); }
.ans-btn:active { transform: scale(0.97); }
.ans-btn.good { background: #e2f2e6; border-color: #3b8f5a; color: #2c6b44; }
.ans-btn.bad { background: #f9e3e0; border-color: #b34a37; color: #8f3a2b; }
.ans-btn.wide { grid-column: 1 / -1; font-size: 22px; padding: 16px 0; }
#msg { text-align: center; font-size: clamp(14px, 2.2vh, 18px); min-height: 26px; margin: clamp(6px, 1.4vh, 12px) 0 2px; color: #5a4a2f; font-weight: 600; }
/* school-style column working */
#colwork { display: flex; justify-content: center; margin: 2px 0 6px; }
.colgrid { display: grid; gap: 3px 8px; }
.ccell {
  width: clamp(44px, 7vh, 60px); height: clamp(40px, 6.4vh, 56px);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(28px, 5vh, 42px); font-weight: 700; position: relative; color: #3a3226;
}
.ccell.op { color: #a08f6e; }
.cline { grid-column: 1 / -1; border-top: 3.5px solid #5a4a2f; margin: 2px 0; }
.cline2 { grid-column: 1 / -1; border-top: 3.5px solid #5a4a2f; border-bottom: 3.5px solid #5a4a2f; height: 5px; margin: 2px 0; }
.slot { border: 3px dashed #d8cdb4; border-radius: 12px; background: #fff; color: #2c6b44; }
.slot.active { border-color: #e8b73a; background: #fdf3d7; animation: slotpulse 1.3s ease-in-out infinite; }
.slot.done { border-style: solid; border-color: #3b8f5a; background: #e2f2e6; }
.slot.given { border-style: solid; border-color: #d8cdb4; background: #f4eedd; color: #a08f6e; }
@keyframes slotpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
.carry { position: absolute; right: 3px; bottom: 1px; font-size: 16px; color: #b34a37; font-weight: 700; }
.borrow { position: absolute; left: 3px; top: 1px; font-size: 15px; color: #b34a37; font-weight: 700; }
.xed { text-decoration: line-through; text-decoration-thickness: 3px; text-decoration-color: #b34a37; color: #b9a98a; }
.newdig { position: absolute; top: -4px; left: 2px; font-size: 16px; color: #b34a37; font-weight: 700; }
#answers.pad { grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; }
#answers.pad .ans-btn { font-size: clamp(20px, 3.2vh, 28px); padding: clamp(8px, 1.8vh, 14px) 0; border-radius: 14px; }
.endmsg { grid-column: 1 / -1; text-align: center; font-size: 19px; font-weight: 600; color: #3a3226; margin: 2px 0; }
.endsummary { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.endsummary .mini { text-align: center; font-size: 11px; color: #5a4a2f; width: 74px; }
.endsummary svg { width: 54px; }
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
  padding: 2px 18px 4px;
  font-size: 12px;
  color: #a08f6e;
}
footer a { color: #a08f6e; text-decoration: underline; cursor: pointer; }
#meadow { display: block; width: 100%; margin-top: auto; flex: 0 0 auto; height: clamp(90px, 18vh, 200px); }

/* daily quest pill */
#quest {
  display: flex; align-items: center; justify-content: center; gap: 7px;
  margin: 5px auto 0; padding: 3px 14px 3px 6px; width: max-content; max-width: 96%;
  font-size: 13.5px; font-weight: 600; color: #5a4a2f;
  background: #fff; border: 2px solid #e4dcc8; border-radius: 999px; cursor: pointer;
}
#quest.hidden { display: none; }
#quest.done { border-color: #6aa84f; background: #eef7ea; }
#quest svg { width: 27px; height: 27px; }
/* seasonal falling bits */
.fall { animation: fallY 10s linear infinite; }
@keyframes fallY { from { transform: translateY(-30px); opacity: 0.9; } to { transform: translateY(190px); opacity: 0; } }

/* treasures in the scene */
.tbob { animation: tbob 4.5s ease-in-out infinite; }
@keyframes tbob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
.silh { filter: grayscale(1) brightness(0.55) contrast(0.85); opacity: 0.8; }
svg.wig { animation: wig 0.7s ease; }
@keyframes wig { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 60% { transform: rotate(8deg); } }

/* wings */
.wl, .wr { transform-box: fill-box; transform-origin: left center; }
.wr { transform: scale(-1, 1); }
@keyframes flapL { 0%,100% { transform: scaleX(1); } 50% { transform: scaleX(0.25); } }
@keyframes flapR { 0%,100% { transform: scale(-1,1); } 50% { transform: scale(-0.25,1); } }
.flap .wl { animation: flapL 0.5s ease-in-out 4; }
.flap .wr { animation: flapR 0.5s ease-in-out 4; }
.flying .wl { animation: flapL 0.35s ease-in-out infinite; }
.flying .wr { animation: flapR 0.35s ease-in-out infinite; }

/* new-species flyer */
#flyer { position: fixed; left: 0; top: 16%; z-index: 60; pointer-events: none; animation: flyx 4s linear forwards; }
#flyer .bob { animation: bob 1.2s ease-in-out infinite; display: block; }
@keyframes flyx { from { transform: translateX(-18vw); } to { transform: translateX(112vw); } }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-24px); } }

/* overlays */
.overlay { position: fixed; inset: 0; background: #fdf8ec; overflow-y: auto; z-index: 20; padding: 14px 18px 30px; }
.overlay.hidden { display: none; }
.ovl-head { display: flex; justify-content: space-between; align-items: center; max-width: 640px; margin: 0 auto 6px; }
.ovl-head h2 { margin: 0; font-size: 22px; color: #5a4a2f; }
.ovl-body { max-width: 640px; margin: 0 auto; }
#albumTotal { color: #a08f6e; font-size: 14px; margin: 2px 0 12px; }
#albumGrid, .tgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 10px; }
.card {
  background: #fff;
  border: 2px solid #e4dcc8;
  border-radius: 14px;
  padding: 10px 6px 8px;
  text-align: center;
  cursor: pointer;
}
.card svg { width: 70px; }
.card .nm { font-size: 13px; font-weight: 700; color: #5a4a2f; margin-top: 2px; }
.card .ct { font-size: 11px; color: #a08f6e; }
.card.locked { background: #f4eedd; }
.card.shiny { border-color: #e8b73a; background: #fffaf0; box-shadow: 0 0 10px rgba(232, 183, 58, 0.35); }
.card.locked .nm { color: #a08f6e; }
.card .badge { font-size: 10px; color: #b8860b; font-weight: 700; }
#meters { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; margin-top: 8px; }
.meter { text-align: center; font-size: 11px; color: #5a4a2f; }
.meter svg { width: 52px; }
h3.sect { font-size: 16px; color: #5a4a2f; margin: 20px 0 6px; }
/* grown-ups */
#gate input, #grownName {
  font-size: 18px; padding: 8px 10px; border: 2px solid #d8cdb4; border-radius: 10px; width: 110px; background: #fff;
}
#grownName { width: 200px; }
#voiceSel { font-size: 15px; padding: 8px 10px; border: 2px solid #d8cdb4; border-radius: 10px; background: #fff; max-width: 280px; }
#voiceQuick { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 10px; }
.vq { font-size: 14px; padding: 9px 14px; border: 2px solid #d8cdb4; border-radius: 999px; background: #fff; color: #5a4a2f; cursor: pointer; }
.vq.on { background: #4a7ba6; border-color: #4a7ba6; color: #fff; }
.gbtn {
  font-size: 15px; padding: 9px 16px; border: 2px solid #d8cdb4; border-radius: 999px; background: #fff; color: #5a4a2f; cursor: pointer; margin-left: 6px;
}
.gbtn.danger { border-color: #c9847a; color: #8f3a2b; }
table.stats { border-collapse: collapse; width: 100%; font-size: 14px; }
table.stats th, table.stats td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #e8e0cc; }
table.stats th { color: #a08f6e; font-weight: 600; font-size: 12px; }
.note { font-size: 12px; color: #a08f6e; }
@media (max-width: 420px) {
  #question { font-size: 44px; }
  .ans-btn { font-size: 27px; padding: 18px 0; }
}
</style>
</head>
<body>
<header>
  <h1>Butterfly maths</h1>
  <div id="hdrBtns">
    <button class="hdr-btn" id="albumBtn">🦋 Album</button>
    <button class="hdr-btn" id="soundBtn" aria-pressed="true">Sound: on</button>
    <button class="hdr-btn" id="voiceBtn" aria-pressed="true">Voice: on</button>
  </div>
</header>
<main>
  <div id="modes"></div>
  <div id="quest" class="hidden" title="Today’s quest"></div>
  <div id="stars"></div>
  <p id="qcount"></p>
  <div id="picture" title="Tap to hear the question again"></div>
  <p id="question" title="Tap to hear the question again"></p>

</main>
<footer>
  <span id="totalCaught"></span>
  <a id="grownLink">Grown-ups</a>
</footer>
<svg id="meadow" viewBox="0 0 680 170" preserveAspectRatio="xMidYMax slice" role="img" aria-label="A meadow that fills with butterflies as you answer correctly">
  <g transform="translate(622 30)">
    <path d="M-28 0 H-36 M28 0 H36 M0 -28 V-36 M0 28 V36 M-20 -20 L-26 -26 M20 20 L26 26 M-20 20 L-26 26 M20 -20 L26 -26" stroke="#f3cf63" stroke-width="4" stroke-linecap="round"/>
    <circle r="19" fill="#f7d154"/>
  </g>
  <g fill="#f6f1e2">
    <ellipse cx="150" cy="30" rx="36" ry="13"/><ellipse cx="174" cy="21" rx="23" ry="10"/><ellipse cx="126" cy="23" rx="19" ry="9"/>
    <ellipse cx="420" cy="22" rx="28" ry="10"/><ellipse cx="440" cy="15" rx="17" ry="8"/>
  </g>
  <path d="M0 100 C 120 78 240 110 360 96 C 480 84 580 106 680 92 L680 170 L0 170 Z" fill="#7fb163"/>
  <path d="M0 128 C 150 112 300 138 460 124 C 560 115 620 128 680 120 L680 170 L0 170 Z" fill="#6a9c52"/>
  <g id="garden"></g>
  <circle cx="80" cy="132" r="4" fill="#f2e6c9"/><circle cx="162" cy="142" r="4" fill="#e6a4b8"/>
  <circle cx="300" cy="138" r="4" fill="#e8c84f"/><circle cx="452" cy="134" r="4" fill="#e6a4b8"/>
  <circle cx="560" cy="142" r="4" fill="#f2e6c9"/><circle cx="622" cy="130" r="4" fill="#e8c84f"/>

</svg>

<div id="albumPage" class="overlay hidden">
  <div class="ovl-head">
    <h2>🦋 Butterfly album</h2>

  <div class="ovl-head">

  </div>

    <div id="gate">
      <p>A quick question to keep little fingers out: <strong>what is 7 × 8?</strong></p>
      <input type="number" id="gateIn" inputmode="numeric" aria-label="Answer to seven times eight">
      <button class="gbtn" id="gateBtn">Open</button>

    <div id="grownContent" style="display:none"></div>

<script>
"use strict";
/* ---------- tiny helpers ---------- */
const $ = id => document.getElementById(id);
const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) { const j = rnd(0, i); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr;
}
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

/* ---------- numbers to spoken words ---------- */
const W1 = ["zero","one","two","three","four","five","six","seven","eight","nine","ten","eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen"];
const W10 = ["","ten","twenty","thirty","forty","fifty","sixty","seventy","eighty","ninety"];
function words(n) {
  n = Math.round(n);
  if (n < 0) return "minus " + words(-n);
  if (n < 20) return W1[n];
  if (n < 100) return W10[Math.floor(n / 10)] + (n % 10 ? "-" + W1[n % 10] : "");
  if (n < 1000) { const h = Math.floor(n / 100), r = n % 100; return W1[h] + " hundred" + (r ? " and " + words(r) : ""); }
  return "one thousand";
}
const SAY_MAP = { "½": "one half", "¼": "one quarter", "⅓": "one third", "¾": "three quarters", "<": "less than", ">": "greater than", "=": "equals" };
const sayVal = v => SAY_MAP[v] || (isNaN(+v) ? v : words(+v));

/* ---------- state ---------- */
function defaultState() {
  return { caught: {}, topics: {}, rounds: 0, bestRound: {}, name: "", legacy: 0, shiny: {},
           settings: { sound: true, voice: true, voiceName: "", voiceStyle: "" } };
}
function loadState() {
  let s = defaultState();
  try {
    const raw = localStorage.getItem("hk_state");
    if (raw) {
      const p = JSON.parse(raw);
      s = Object.assign(s, p);
      s.settings = Object.assign({ sound: true, voice: true, voiceName: "", voiceStyle: "" }, p.settings || {});
    }
  } catch (e) {}
  // migrate the old simple counter from the first version
  const old = parseInt(localStorage.getItem("hk_album") || "0");
  if (old > 0) { s.legacy += old; try { localStorage.removeItem("hk_album"); } catch (e) {} }
  return s;
}
let S = loadState();
function saveState() { try { localStorage.setItem("hk_state", JSON.stringify(S)); } catch (e) {} }
function topicStat(m) {
  if (!S.topics[m]) S.topics[m] = { asked: 0, correct: 0, missed: {} };
  if (!S.topics[m].missed) S.topics[m].missed = {};
  return S.topics[m];
}
function totalCaught() {
  return S.legacy + Object.values(S.caught).reduce((a, b) => a + b, 0);
}

/* ---------- sounds (Web Audio, synthesized) ---------- */
let actx = null;
function play(notes) {
  if (!S.settings.sound) return;
  try {
    actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === "suspended") actx.resume();
    let t = actx.currentTime;
    for (const [freq, dur] of notes) {
      const o = actx.createOscillator(), g = actx.createGain();
      o.type = "sine";
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.2, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(actx.destination);
      o.start(t);
      o.stop(t + dur + 0.05);
      t += dur * 0.85;
    }
  } catch (e) {}
}
const sCorrect = () => play([[660, 0.13], [880, 0.22]]);
const sWrong = () => play([[200, 0.25]]);
const sTap = () => play([[440, 0.06]]);
const sFanfare = () => play([[523, 0.14], [659, 0.14], [784, 0.14], [1047, 0.4]]);
const sUnlock = () => play([[523, 0.12], [659, 0.12], [784, 0.12], [988, 0.12], [1319, 0.5]]);

/* ---------- voice (Web Speech API, British English) ---------- */
let voiceObj = null;
// Apple's "novelty" voices sound robotic — never auto-pick them
const NOVELTY = /eddy|flo|grandma|grandpa|reed|rocko|sandy|shelley|albert|bad news|bahh|bells|boing|bubbles|cellos|fred|good news|jester|junior|kathy|organ|ralph|superstar|trinoids|whisper|wobble|zarvox/i;
function scoreVoice(v) {
  const n = v.name.toLowerCase(), gb = /en[-_]gb/i.test(v.lang);
  if (gb && /serena|kate|martha|stephanie/.test(n)) return 100; // natural female GB (iPad)
  if (/google uk english female/.test(n)) return 95;            // Chrome
  if (/sonia|libby|maisie/.test(n)) return 90;                  // Edge natural GB female
  if (/moira/.test(n)) return 80;                               // natural female en-IE
  if (/karen/.test(n)) return 75;                               // natural female en-AU
  if (/tessa/.test(n)) return 70;                               // natural female en-ZA
  if (gb && /daniel/.test(n)) return 65;                        // natural GB male beats robots
  if (/google uk english male/.test(n)) return 60;
  if (gb && !NOVELTY.test(n)) return 50;
  if (/samantha/.test(n)) return 45;                            // natural female en-US
  if (!NOVELTY.test(n)) return 20;
  return gb ? 10 : 0;
}
// "characters" — tuned pitch/rate presets applied to the best lady voice on the device
const PERSONAS = [
  { id: "sunny",  label: "🌼 Sunny",  pitch: 1.18, rate: 1.08 },
  { id: "fairy",  label: "🧚 Fairy",  pitch: 1.32, rate: 1.1 },
  { id: "gentle", label: "🌙 Gentle", pitch: 1.05, rate: 0.98 }
];
const FEMALE = /kate|serena|martha|stephanie|samantha|allison|ava|susan|zoe|nicky|joelle|sonia|libby|maisie|aria|jenny|michelle|female/i;
function bestFemaleVoice() {
  try {
    return speechSynthesis.getVoices()
      .filter(v => /en[-_](GB|US)/i.test(v.lang) && !NOVELTY.test(v.name) && FEMALE.test(v.name))
      .sort((a, b) => scoreVoice(b) - scoreVoice(a))[0] || null;
  } catch (e) { return null; }
}
function pickVoice() {
  try {
    const vs = speechSynthesis.getVoices().filter(v => /en[-_](GB|US)/i.test(v.lang));
    if (S.settings.voiceName) {
      const v = vs.find(x => x.name === S.settings.voiceName);

/* ---------- the daily friend & quest ---------- */
function dateStr(d = new Date()) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function dateSeed(s) {
  let h = 0;
  for (const c of s) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return h;
}
// each morning a friend visits with a quest aimed at her neediest topic
function ensureQuest() {
  const today = dateStr();
  if (S.quest && S.quest.date === today) return;
  const seed = dateSeed(today);
  const all = TREASURES.filter(t => t.coll === "friends");
  const un = all.filter(t => !(S.caught[t.id] > 0));
  const friend = un.length ? un[seed % un.length] : all[seed % all.length];
  const ranked = Object.keys(MODES).map(m => {
    const st = topicStat(m);
    const acc = st.asked >= 5 ? st.correct / st.asked : -1; // barely-tried topics are neediest
    const fresh = st.last === today ? 0.15 : 0;             // played today already? less needy
    return { m, score: acc + fresh };
  }).sort((a, b) => a.score - b.score);
  S.quest = { date: today, friend: friend.id, topic: ranked[seed % 3].m, need: 6, got: 0, done: false };
  saveState();
}
function renderQuest() {
  const qd = S.quest;
  if (!qd) { $("quest").classList.add("hidden"); return; }
  $("quest").classList.remove("hidden");
  const f = TR[qd.friend];
  const mini = '<svg viewBox="-24 -24 48 48">' + treasureSVG(f) + '</svg>';
  $("quest").classList.toggle("done", qd.done);
  $("quest").innerHTML = mini + "<span>" + (qd.done
    ? "The " + f.name + " is staying! ✓"
    : "The " + f.name + "’s quest: " + (qd.need - qd.got) + " more “" + MODES[qd.topic].label + "”!") + "</span>";
  $("quest").onclick = () => speak(qd.done
    ? "The " + f.name + " finished the quest with you and is staying in your meadow! " + f.fact
    : "Good morning" + nameBit() + "! The " + f.name + " has a quest for you: get " + words(qd.need - qd.got) +
      " more “" + MODES[qd.topic].label + "” questions right, and the " + f.name + " will stay in your meadow!");
}
function questProgress() {
  const qd = S.quest;
  if (!qd || qd.done || qd.date !== dateStr() || mode !== qd.topic) return;
  qd.got++;
  if (qd.got >= qd.need) {
    qd.done = true;
    const f = TR[qd.friend];
    const isNew = !(S.caught[f.id] > 0);
    S.caught[f.id] = (S.caught[f.id] || 0) + 1;
    if (isNew) roundNew.push(f.id);
    addTreasureToScene(f.id);
    celebrate(f);
    setTimeout(() => speak("Quest complete" + nameBit() + "! The " + f.name + " is staying in your meadow! " + f.fact, { queue: true }), 600);
  }
  renderQuest();
}

function hatchEgg() {
  if (!S.egg || S.egg.state !== "dropped") return null;
  S.egg.state = "hatched";
  const egg = $("eggItem");
  if (egg) egg.remove();
  S.shiny = S.shiny || {};
  const owned = TREASURES.filter(t => t.coll !== "friends" && S.caught[t.id] > 0 && !S.shiny[t.id]);
  if (owned.length) {
    const t = owned[rnd(0, owned.length - 1)];
    S.shiny[t.id] = true;
    return { text: " 🥚 The mystery egg hatched — your " + t.name + " turned SHINY!",
             say: " And listen — the mystery egg hatched, and your " + t.name + " turned shiny!" };
  }
  const sp = SPECIES[rnd(0, SPECIES.length - 1)];
  S.caught[sp.id] = (S.caught[sp.id] || 0) + 1;
  addToMeadow(sp.id);
  return { text: " 🥚 The mystery egg hatched — a " + sp.name + " flew out!",
           say: " And the mystery egg hatched — a " + sp.name + " flew out! " + sp.fact };
}

/* ---------- question generators ---------- */
// invisible difficulty 0 (gentle) → 1 (full stretch): grows with topic mastery,
// ramps up through the round, and quietly eases after a miss. Never shown to the child.
function hardness() {
  const st = topicStat(mode);
  const mastery = Math.min(1, st.correct / 40);
  const ramp = Math.min(1, qnum / (TOTAL - 1));
  let h = mastery * 0.65 + ramp * 0.35;
  if (lastGood === false) h *= 0.6;
  return Math.max(0, Math.min(1, h));
}
// random integer in a range that slides from [lo0,hi0] (easy) to [lo1,hi1] (hard)
function hrnd(h, lo0, hi0, lo1, hi1) {
  return rnd(Math.round(lo0 + (lo1 - lo0) * h), Math.round(hi0 + (hi1 - hi0) * h));
}
// mastery level per topic: 1 budding, 2 blooming (15+ correct), 3 golden (40+)
function topicLvl(m) {
  const c = topicStat(m).correct;
  return c >= 40 ? 3 : c >= 15 ? 2 : 1;
}
function numOptions(correct, pool) {
  const opts = [String(correct)];
  const cand = shuffle(pool.filter(v => v > 0 && v !== correct));
  for (const v of cand) { const s = String(v); if (opts.length < 3 && !opts.includes(s)) opts.push(s); }
  let k = 2;
  while (opts.length < 3) { const v = correct + k; if (v > 0 && !opts.includes(String(v))) opts.push(String(v)); k++; }
  return shuffle(opts);
}
function tableMode(n, year, sp, label) {
  return { label, year, sp, gen(p) {
    // easy facts (×1–5) first; the tricky ×6–12 arrive as she grows
    const a = p ? p.a : hrnd(hardness(), 1, 5, 3, 12);
    const c = a * n;
    return { p: { a }, text: a + " × " + n + " = ?", say: "What is " + words(a) + " times " + words(n) + "?",
             correct: String(c), options: numOptions(c, [c - n, c + n, c - 1, c + 1, c + 10]) };
  } };
}

  add: { label: "Adding", year: 2, sp: "red_admiral", gen(p) {

    const h = hardness();
    if (kind === "pic") {
      const a = p ? p.a : hrnd(h, 2, 6, 4, 10), b = p ? p.b : hrnd(h, 2, 4, 3, 10);
      const c = a + b;

             say: "You have " + words(a) + " pence and you spend " + words(b) + " pence on a sweetie. How much is left?",

// top of the meadow's VISIBLE band in viewBox units (wide screens crop the sky away)
function meadowTop() {

function addToMeadow(spId, opts = {}) {
  // land inside the visible band, however the meadow is cropped on small/wide screens
  const yMin = Math.max(84, meadowTop() + 10);
  const x = rnd(120, 560), y = rnd(yMin, Math.max(146, yMin + 8)), s = (0.6 + Math.random() * 0.45).toFixed(2), r = rnd(-25, 25);

  g.style.transform = "translate(" + sx + "px, " + sy + "px) rotate(" + sr + "deg) scale(" + s + ")";

// returns the items caught this answer (new discoveries only)
function awardCatch() {
  const coll = activeColl();
  const ids = [];
  if (coll === "bfly") {
    ids.push(MODES[mode].sp);
    const st = topicStat(mode);
    if (st.correct >= 15 && Math.random() < 0.25) ids.push(WANDERERS[rnd(0, 1)]);
  } else {
    // treasures arrive IN ORDER, each tied to a topic; the final three of a page
    // also need a blooming flower (level 2+) in their topic — better ones cost more
    const nt = nextTreasure(coll);
    const idx = nt ? TREASURES.filter(t => t.coll === coll && t.t === "c").indexOf(nt) : -1;
    const gated = nt && idx >= 4 && topicLvl(nt.topic) < 2;
    const owned = TREASURES.filter(t => t.coll === coll && S.caught[t.id] > 0);
    if (nt && nt.topic === mode && !gated && Math.random() < 0.4) ids.push(nt.id);
    else if (owned.length && Math.random() < 0.5) ids.push(owned[rnd(0, owned.length - 1)].id);
    else ids.push(SPECIES[rnd(0, SPECIES.length - 1)].id); // an old butterfly friend visits
  }
  // caught at a golden flower (level 3)? it becomes a shiny
  S.shiny = S.shiny || {};
  if (TR[ids[0]] && !(S.caught[ids[0]] > 0) && topicLvl(mode) >= 3) S.shiny[ids[0]] = true;
  const news = [];
  for (const id of ids) {
    const isNew = !(S.caught[id] > 0);
    S.caught[id] = (S.caught[id] || 0) + 1;
    roundIds.push(id);
    addCaughtToScene(id);
    if (isNew) { roundNew.push(id); news.push(id); }
  }
  return news;
}
function unlockRare() {
  const coll = activeColl();
  const pool = coll === "bfly" ? RARES : TREASURES.filter(t => t.coll === coll && t.t === "r").map(t => t.id);
  const id = pool.find(r => !(S.caught[r] > 0));
  if (!id) return null;
  S.caught[id] = 1;
  roundNew.push(id);
  addCaughtToScene(id);
  celebrate(ITEM(id));
  return ITEM(id);
}

    const qq = MODES[mode].gen(st.missed[k].p);
    qq.key = k;
    return qq;
  }
  const qq = MODES[mode].gen();
  qq.key = mode + "|" + JSON.stringify(qq.p);
  return qq;
}

    $("question").textContent = "";

    $("answers").innerHTML = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0].map(d =>
      '<button class="ans-btn" data-v="' + d + '">' + d + "</button>").join("");
    document.querySelectorAll(".ans-btn").forEach(btn => { btn.onclick = () => colTap(btn); });
  } else {
    $("question").textContent = q.text;
    $("question").style.fontSize = q.text.length > 12 ? "30px" : "52px";
    $("picture").innerHTML = q.picture || "";
    $("answers").innerHTML = q.options.map(v =>
      '<button class="ans-btn' + (String(v).length > 6 ? " txt" : "") + '" data-v="' + v + '">' + v + "</button>").join("");
    document.querySelectorAll(".ans-btn").forEach(btn => { btn.onclick = () => pick(btn); });
  }
  speak(questionLead() + q.say, { queue: qnum > 0 });
  armNudge();
}
// a short encouraging bridge before each question is read out
function questionLead() {
  if (qnum === 0) return vary("lead0", ["Here we go! ", "Off we go — butterfly time! ", "Let's catch some butterflies! "]);
  if (qnum === TOTAL - 1) return vary("leadLast", ["The very last one — make it shine! ", "One more for a full meadow! ", "Last question — you can do it! "]);
  if (qnum === TOTAL / 2) return "Halfway there already" + nameBit() + " — wonderful flying! ";
  if (lastGood) return vary("leadGood", [
    "You're on a roll! ", "Let's catch another one! ", "Ready for the next one? ",
    "Another butterfly is waiting! ", "You're doing so well — next one! ", "Keep it up! "
  ]);
  return vary("leadBad", [
    "You've got this one! ", "Here's a fresh one for you! ",
    "A new one — you can do it! ", "Take a deep breath — here we go! "
  ]);
}
function armNudge() {
  clearTimeout(promptT);
  promptT = setTimeout(() => {
    if (!locked) speak(vary("nudge", ["Take your time. ", "No hurry. ", "Have a little think. "]) + q.say, { rate: 0.98 });
  }, 25000);
}

/* ---------- school-style column working ---------- */
function colSay(i) {
  const { a, b, op } = q.col;
  const oa = a % 10, ob = b % 10, ta = Math.floor(a / 10), tb = Math.floor(b / 10);
  if (op === "+") {
    if (i === 0) return "Ones first! What is " + words(oa) + " add " + words(ob) + "?";
    return "Now the tens! What is " + words(ta) + " add " + words(tb) +
           (oa + ob >= 10 ? ", add the little one we carried?" : "?");
  }
  if (i === 0) {
    if (oa < ob) return cap(words(oa)) + " is smaller than " + words(ob) +
      ", so we exchange a ten. Now: what is " + words(oa + 10) + " take away " + words(ob) + "?";
    return "Ones first! What is " + words(oa) + " take away " + words(ob) + "?";
  }
  return "Now the tens! What is " + words(ta - (oa < ob ? 1 : 0)) + " take away " + words(tb) + "?";
}
function renderColumn() {
  const { a, b, op } = q.col;
  const cs = q.correct, n = 2;
  const da = String(a).split(""), db = String(b).split("");
  const exch = op === "−" && (a % 10) < (b % 10);
  let g = '<div class="colgrid" style="grid-template-columns: repeat(' + (n + 1) + ', auto)">';
  g += '<div class="ccell"></div>';
  da.forEach((d, i) => {
    if (exch && i === 0) g += '<div class="ccell"><span class="xed">' + d + '</span><span class="newdig">' + (parseInt(d) - 1) + '</span></div>';
    else if (exch && i === 1) g += '<div class="ccell"><span class="borrow">1</span>' + d + '</div>';
    else g += '<div class="ccell">' + d + '</div>';
  });
  g += '<div class="ccell op">' + op + '</div>';
  db.forEach(d => { g += '<div class="ccell">' + d + '</div>'; });
  g += '<div class="cline"></div>';
  g += '<div class="ccell"></div>';
  for (let i = 0; i < n; i++) g += '<div class="ccell slot' + (n - 1 - i === 0 ? " active" : "") + '" id="slot-' + (n - 1 - i) + '"></div>';
  g += '<div class="cline2"></div></div>';
  $("picture").innerHTML = '<div id="colwork">' + g + '</div>';
  q.w = { i: 0, colWrongs: 0, any: false, cs };
  q.say = vary("colIntro", ["Let us write it in columns, like at school! ", "Column time — just like in your book! ", "Let us do the working out! "]) + colSay(0);
}
function colAdvance(given) {
  const w = q.w, exp = w.cs[w.cs.length - 1 - w.i];
  const slot = $("slot-" + w.i);
  slot.classList.remove("active");
  slot.classList.add(given ? "given" : "done");
  slot.insertAdjacentHTML("beforeend", "<span>" + exp + "</span>");
  if (q.col.op === "+" && w.i === 0 && (q.col.a % 10 + q.col.b % 10) >= 10)
    $("slot-1").insertAdjacentHTML("beforeend", '<span class="carry">1</span>');
  w.i++;
  w.colWrongs = 0;
  if (w.i >= w.cs.length) {
    locked = true;
    clearTimeout(promptT);
    topicStat(mode).asked++;
    if (w.any) {
      resolveBad({
        text: "You worked it out — " + q.col.a + " " + q.col.op + " " + q.col.b + " = " + q.correct + "! We’ll practise that one again.",
        say: "You worked it out" + nameBit() + "! The answer is " + sayVal(q.correct) + ". We will practise that one again soon."
      });
    } else resolveGood();
    return;
  }
  $("slot-" + w.i).classList.add("active");
  q.say = colSay(w.i);
  const carryBit = q.col.op === "+" && (q.col.a % 10 + q.col.b % 10) >= 10 && !given ? "Carry the one! " : "";
  speak((given ? "" : vary("colStep", ["Yes! ", "Lovely! ", "That's it! "]) + carryBit) + q.say);
  armNudge();
}
function colTap(btn) {
  if (locked || !q.col || !q.w) return;
  const w = q.w, exp = w.cs[w.cs.length - 1 - w.i];
  if (btn.dataset.v === exp) {
    play([[700, 0.09], [880, 0.12]]);
    colAdvance(false);
  } else {
    w.colWrongs++;
    w.any = true;
    btn.classList.add("bad");
    setTimeout(() => btn.classList.remove("bad"), 600);
    sWrong();
    if (w.colWrongs >= 2) {
      speak("It is " + words(parseInt(exp)) + ". ");
      setTimeout(() => colAdvance(true), 900);
    } else {
      speak(vary("tryAgain", ["Not quite — try again!", "Almost! Have another go.", "Hmm — try once more!"]));
    }
  }
}

function pick(btn) {
  if (locked) return;
  locked = true;
  clearTimeout(promptT);
  const v = btn.dataset.v;
  const st = topicStat(mode);
  st.asked++;
  if (v === q.correct) {
    btn.classList.add("good");
    resolveGood();
  } else {
    btn.classList.add("bad");
    document.querySelectorAll(".ans-btn").forEach(b => { if (b.dataset.v === q.correct) b.classList.add("good"); });
    resolveBad();
  }
}
function resolveGood() {
  const st = topicStat(mode);
  lastGood = true;
  {
    score++;
    st.correct++;
    delete st.missed[q.key];
    const news = awardCatch();
    const lastId = roundIds[roundIds.length - 1];
    const caughtItem = ITEM(lastId);
    const isTreasure = !!TR[lastId];
    const spName = caughtItem.name;
    if (news.length) {
      const nsp = ITEM(news[news.length - 1]);
      celebrate(nsp);
      $("msg").textContent = (TR[nsp.id]
        ? vary("newTMsg", ["✨ NEW treasure! You found the {s}!", "✨ A sparkling discovery — the {s}!", "✨ Your very own {s}!"])
        : vary("newMsg", ["✨ NEW butterfly! You caught a {s}!", "✨ A brand new species — the {s}!", "✨ Your first ever {s}!"])
      ).replace("{s}", nsp.name);
      speak((TR[nsp.id]
        ? vary("newTSay", [
            "A new treasure for your album{n}! The {s}!",
            "Ooh, how magical{n}! You found the {s}!",
            "Look{n}! The {s} — a brand new treasure!"
          ])
        : vary("newSay", [
            "A new butterfly for your album{n}! The {s}!",
            "Ooh, a brand new visitor{n}! It is the {s}!",
            "Look{n}! A {s} — the very first one for your album!"

        "{p}{n}! A {s} appears!",
        "{p}{n}! More sparkle for your meadow.",
        "{p}{n}!"
      ]).replace("{p}", pr.replace("!", "")).replace("{n}", nameBit()).replace("{s}", spName));
    } else {
      const pr = vary("praise", PRAISE);
      $("msg").textContent = pr + " " + vary("landed", [
        "A {s} landed!", "Here comes a {s}!", "A {s} fluttered down!",
        "You caught a {s}!", "A {s} joins your meadow!"
      ]).replace("{s}", spName);
      speak(vary("praiseSay", [
        "{p}{n}! You caught a {s}.",
        "{p}{n}! Here comes a {s}.",
        "{p} A {s} has fluttered down.",
        "{p}{n}!",
        "{p} Another {s} for your meadow."
      ]).replace("{p}", pr.replace("!", "")).replace("{n}", nameBit()).replace("{s}", spName));

function resolveBad(custom) {
  const st = topicStat(mode);
  lastGood = false;
  st.missed[q.key] = { p: q.p, t: q.text, n: ((st.missed[q.key] || {}).n || 0) + 1 };
  if (custom) {
    $("msg").textContent = custom.text;
    $("msg").style.color = "#5a4a2f";
    speak(custom.say);
  } else {
    const ex = q.explain || ("the answer is " + q.correct);
    $("msg").textContent = vary("wrongLead", ["Not quite — ", "Good try — ", "Almost — ", "Nearly — "]) + ex + ". " +
      vary("wrongTail", ["Next one!", "On we go!", "Let's try another!"]);
    $("msg").style.color = "#5a4a2f";
    speak(vary("wrongSayLead", ["Not quite. ", "Good try. ", "Almost. ", "Never mind. "]) +
      cap(q.sayExplain || ("The answer is " + sayVal(q.correct))) + ". " +
      vary("wrongSayTail", ["On to the next one!", "Here comes another one!", "You'll get the next one!", "Let's try another."]));
    sWrong();
  }
  finishQ();
}
function finishQ() {
  topicStat(mode).last = dateStr();

  setFooter();

}

             : score >= 5 ? vary("head5", ["Great trying!", "Well flown!", "Lovely effort!"])

    : "You caught " + score + (score === 1 ? " star" : " stars") + " out of " + TOTAL + " — treasure hunting!";
  if (rare) catchLine += " ✨ A rare " + rare.name + " has appeared!";
  const uniq = [...new Set(roundIds)];
  let say = coll === "bfly"
    ? "You caught " + words(score) + (score === 1 ? " butterfly" : " butterflies") + nameBit() + "!"
    : "You caught " + words(score) + (score === 1 ? " star" : " stars") + nameBit() + "!";
  const newNames = roundNew.map(id => ITEM(id).name);
  if (rare) say += " And something very rare has appeared: the " + rare.name + "!";
  else if (newNames.length) say += " You discovered the " + newNames.join(" and the ") + "!";
  const hatch = hatchEgg();
  if (hatch) { catchLine += hatch.text; say += hatch.say; }
  // first time a collection page opens: make it a moment

function lockedHint(sp) {

  if (sp.t === "u") return "It visits children who keep practising…";

function flowerSVG(filled) {
  let p = "";
  for (let i = 0; i < 8; i++) {
    p += '<ellipse cx="30" cy="13" rx="6.5" ry="11" transform="rotate(' + i * 45 + ' 30 30)" fill="' +
         (i < filled ? "#e8638c" : "none") + '" stroke="#c98ca0" stroke-width="1.5"/>';
  }
  return '<svg viewBox="0 0 60 60">' + p + '<circle cx="30" cy="30" r="7" fill="#e8c84f"/></svg>';
}

    speak(S.name ? "Hello, " + S.name + "!" : "Name cleared.");
  };
  const voices = ("speechSynthesis" in window)
    ? speechSynthesis.getVoices().filter(v => /en[-_](GB|US)/i.test(v.lang)).sort((a, b) => scoreVoice(b) - scoreVoice(a))
    : [];
  const markQuick = () => document.querySelectorAll(".vq").forEach(x => {
    const on = S.settings.voiceName
      ? x.dataset.v === S.settings.voiceName && x.dataset.s === (S.settings.voiceStyle || "")
      : !!voiceObj && x.dataset.v === voiceObj.name && !x.dataset.s;
    x.classList.toggle("on", on);
  });
  const fem = bestFemaleVoice();
  const pills = (fem ? PERSONAS.map(p => ({ v: fem.name, s: p.id, label: p.label })) : [])
    .concat(voices.filter(v => !NOVELTY.test(v.name)).slice(0, 4)
      .map(v => ({ v: v.name, s: "", label: v.name + " · " + v.lang })));
  $("voiceQuick").innerHTML = pills.map(pl =>
    '<button class="vq" data-v="' + pl.v.replace(/"/g, "&quot;") + '" data-s="' + pl.s + '">' + pl.label + "</button>").join("");
  document.querySelectorAll(".vq").forEach(b => b.onclick = () => {
    S.settings.voiceName = b.dataset.v;
    S.settings.voiceStyle = b.dataset.s;
    saveState();
    pickVoice();
    markQuick();
    $("voiceSel").value = b.dataset.v;
    speak(vary("vqSample", ["Hello{n}! What is two add three?", "Hello{n}! Brilliant! You caught a Peacock.", "Well done{n}! Shall we catch some butterflies?"]).replace("{n}", nameBit()));
  });
  markQuick();
  $("voiceSel").innerHTML =
    '<option value="">Automatic (best available)</option>' +
    voices.map(v => '<option value="' + v.name.replace(/"/g, "&quot;") + '"' +
      (S.settings.voiceName === v.name ? " selected" : "") + '>' +
      v.name + " — " + v.lang + (NOVELTY.test(v.name) ? " (robot!)" : "") + '</option>').join("");
  $("voiceSel").onchange = () => {
    S.settings.voiceName = $("voiceSel").value;
    S.settings.voiceStyle = "";
    saveState();
    pickVoice();
    markQuick();
    speak("Hello" + nameBit() + "! What is two add three?");
  };
  $("voiceTest").onclick = () => speak("Hello" + nameBit() + "! Brilliant! You caught a Red Admiral.");
  $("resetBtn").onclick = () => {
    if (confirm("Erase the whole album, all progress and the name? This cannot be undone.")) {
      try { localStorage.removeItem("hk_state"); } catch (e) {}
      location.reload();
    }
  };
}
$("grownLink").onclick = () => {
  $("gateIn").value = "";
  $("gateMsg").textContent = "";
  $("gate").style.display = "";
  $("grownContent").style.display = "none";
  $("grownPage").classList.remove("hidden");
};
$("gateBtn").onclick = () => {
  if (+$("gateIn").value === 56) {
    $("gate").style.display = "none";
    renderGrown();
    $("grownContent").style.display = "";
  } else {
    $("gateMsg").textContent = "Not quite — try again.";
  }
};
$("grownClose").onclick = () => $("grownPage").classList.add("hidden");

/* ---------- toggles & repeat ---------- */
function applySettings() {
  $("soundBtn").textContent = "Sound: " + (S.settings.sound ? "on" : "off");
  $("soundBtn").setAttribute("aria-pressed", String(S.settings.sound));
  $("voiceBtn").textContent = "Voice: " + (S.settings.voice ? "on" : "off");
  $("voiceBtn").setAttribute("aria-pressed", String(S.settings.voice));
}
$("soundBtn").onclick = () => {
  S.settings.sound = !S.settings.sound;
  saveState(); applySettings();
  if (S.settings.sound) sTap();
};
$("voiceBtn").onclick = () => {
  S.settings.voice = !S.settings.voice;
  saveState(); applySettings();
  if (S.settings.voice) speak("Voice on!");
  else { try { speechSynthesis.cancel(); } catch (e) {} }
};
const repeatQ = () => { if (q && !locked) speak(q.say); };
$("question").onclick = repeatQ;
$("picture").onclick = repeatQ;

/* ---------- go ---------- */
ensureQuest();
renderQuest();
dressMeadow();
renderGarden();
buildModes();
setStars();
setFooter();
applySettings();
populateMeadow();
next();
// offline copy for the iPad home-screen app (only on https hosting; harmless elsewhere)
if ("serviceWorker" in navigator && location.protocol === "https:") {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
